<!DOCTYPE html>
<html>
<head>
  <title>Cube Timer</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #e5dea6;
      color: #000000;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    h1 {
      margin: 20px auto 8px;
      font-weight: 500;
      color: #000000;
      text-align: center;
      width: 100%;
    }

    #scramble {
      margin: 20px auto;
      font-size: 20px;
      max-width: 840px;
      text-align: center;
      padding: 12px 18px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.5);
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.16);
      color: #1b1f25;
      letter-spacing: 1px;
      font-family: Consolas, monospace;
    }

    #time {
      font-family: 'Orbitron', 'DS-Digital', monospace;
      font-size: 130px;
      margin: 10px auto;
      font-weight: 900;
      width: min(720px, 82vw);
      text-align: center;
      letter-spacing: -4px;
      color: #111;
      text-shadow: 0 2px 4px rgba(0,0,0,0.25);
      background: #ffffff;
      border-radius: 16px;
      border: 2px solid #333;
      padding: 18px 24px;
      box-shadow: 0 16px 28px rgba(0,0,0,0.2);
      transition: 0.2s;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px auto;
      gap: 12px;
      width: 100%;
      max-width: 1200px;
      margin: 0;
      padding: 8px;
      align-items: start;
      justify-content: stretch;
      position: relative;
      top: 0;
    }

    .solve-panel {
      position: sticky;
      top: 0;
      left: 0;
      width: 280px;
      max-height: 94vh;
      margin-top: 0;
      padding-top: 8px;
    }

    .timer-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .timer-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 760px;
      gap: 8px;
    }

    .session-stats {
      margin-bottom: 12px;
      color: #111;
      font-size: 14px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(230, 230, 230, 0.7);
    }

    .session-stats div {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin: 2px 0;
    }

    .solve-panel h3,
    .solve-panel h4 {
      margin: 8px 0;
      text-align: center;
    }

    .solve-panel {
      height: 94vh;
      overflow: hidden;
      background: rgba(255,255,255,0.95);
      border: 1px solid #2a2f3a;
      border-radius: 14px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .solve-panel h3,
    .solve-panel h4 {
      margin: 4px 0;
    }

    #solves {
      margin-top: 0;
    }

    #solves {
      list-style: none;
      padding: 0;
      margin: 10px 0 0;
      flex: 1;
      overflow-y: auto;
      width: 100%;
    }

    .solve-panel h3,
    .solve-panel h4 {
      margin: 8px 0;
      text-align: center;
    }

    .solve-panel li {
      background: #1a1d24;
      margin: 4px 0;
      padding: 8px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: #ffffff;
    }

    .solve-panel li button {
      padding: 2px 5px;
      font-size: 12px;
      margin-left: 6px;
    }

    .stats {
      margin-top: 8px;
      display: flex;
      gap: 22px;
      justify-content: center;
      font-size: 24px;
    }

    .stats div {
      background: rgba(255, 255, 255, 0.8);
      padding: 8px 14px;
      border-radius: 10px;
      border: 1px solid #888;
      font-weight: 700;
    }

    .stats span {
      color: #111;
    }

    .main {
      display: flex;
      justify-content: flex-end;
      width: min(100%, 1160px);
      margin-top: 20px;
      padding: 0 20px;
    }

    .solve-panel {
      background: rgba(255,255,255,0.9);
      border: 1px solid #2a2f3a;
      border-radius: 14px;
      padding: 12px;
    }

    .controls {
      margin: 15px;
    }

    input {
      padding: 8px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #1a1d24;
      color: #ffffff;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #2a2f3a;
      color: #ffffff;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #3a4150;
    }

    label {
      margin-left: 10px;
      font-size: 14px;
      color: #000000;
    }

    #solves li {
      color: #ffffff;
    }

    #cubeVisual {
      color: #ffffff;
    }

    #solves {
      list-style: none;
      padding: 0;
      max-height: 300px;
      overflow-y: auto;
      width: 220px;
    }

    #solves li {
      background: #1a1d24;
      margin: 5px 0;
      padding: 8px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    #solves button {
      padding: 3px 6px;
      font-size: 12px;
    }

    #cubeVisual {
      background: #1a1d24;
      padding: 15px;
      border-radius: 12px;
      font-size: 18px;
      line-height: 1.4;
      white-space: pre;
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

  </style>
</head>

<body>

<div class="layout">
  <div class="solve-panel">
    <h3>Session</h3>
    <div class="session-stats">
      <div><strong>current</strong> / <strong>best</strong></div>
      <div>time: <span id="best">-</span></div>
      <div>mo3:</div>
      <div>ao5: <span id="ao5">-</span></div>
      <div>ao12: <span id="ao12">-</span></div>
    </div>
    <h4>Solves</h4>
    <ul id="solves"></ul>
  </div>

  <div class="timer-wrapper">
    <h1>Cube Timer</h1>
    <div id="scramble">Scramble...</div>
    <div class="timer-panel">
      <div id="time">0.00</div>
      <div class="stats" style="display:none;">
      </div>
    </div>

    <div class="controls">
  <label for="puzzleType">Mode:</label>
  <select id="puzzleType" onchange="switchPuzzleType()">
    <option value="3x3">3x3</option>
    <option value="2x2">2x2</option>
  </select>

  <button onclick="prevScramble()">Prev Scramble</button>
  <button onclick="nextScramble()">Next Scramble</button>
  <button onclick="generateScramble()">New Scramble</button>

  <input type="text" id="manualTime" placeholder="Enter time (e.g. 12.34)">
  <button onclick="addManual()">Add</button>

  <label>
    <input type="checkbox" id="inspectionToggle">
    15s Inspection
  </label>
</div>

  </div> <!-- timer-wrapper -->
</div> <!-- layout -->


<script src="script.js"></script>

</body>
</html>
